<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Premium Edition</title>
    <meta name="description" content="A premium Tic-Tac-Toe game with a modern glassmorphic design and smooth animations.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="game-container">
        <header>
            <h1>TIC-TAC-TOE</h1>
            <div class="scoreboard">
                <div class="score-card player-x active" id="card-x">
                    <span class="label">PLAYER X</span>
                    <span class="score" id="score-x">0</span>
                </div>
                <div class="score-card player-o" id="card-o">
                    <span class="label">PLAYER O</span>
                    <span class="score" id="score-o">0</span>
                </div>
            </div>
        </header>

        <div class="status-msg" id="status">Player X's Turn</div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="reset-btn" class="btn secondary">Reset Score</button>
            <button id="restart-btn" class="btn primary">Restart Game</button>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Victory!</h2>
            <p id="modal-msg">Player X has won the match.</p>
            <button id="play-again-btn" class="btn primary">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
